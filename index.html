<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raw Location Monitor</title>
</head>
<body style="background:#050505; margin:20px; color:#fff; font-family:Consolas, monospace;">

<div id="debug-log" style="background:#000; color:#0f0; padding:10px; height:60px; overflow-y:scroll; font-size:11px; margin-bottom:10px; border:1px solid #333; border-radius:4px; line-height:1.4;">
    [SYSTEM READY] - Capturing Raw OCR Data...
</div>

<div style="margin-bottom:10px; border:1px solid #444; background:#111; padding:10px; border-radius:4px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
        <span style="color:#00ffee; font-size:10px; text-transform:uppercase;">Raw OCR Vision Feed</span>
        <div>
            <span style="font-size:10px; color:#888;">Threshold: </span>
            <input type="range" id="threshSlider" min="100" max="220" value="175" style="vertical-align:middle;">
        </div>
    </div>
    <canvas id="ocr-debug-view" style="width:100%; height:80px; background:#000; border:1px solid #222; image-rendering: pixelated;"></canvas>
</div>

<div style="background:#1a1a1a; padding:15px; border:1px solid #333; border-radius:4px;">
    <input type="text" id="pName" placeholder="RSI Handle" style="width:100%; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; padding:8px;">
    <input type="text" id="gCode" placeholder="Group Code (e.g. SQUAD1)" style="width:100%; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; padding:8px;">
    
    <input type="text" id="gUrl" value="https://script.google.com/macros/s/AKfycbyqazOPGDBqahu8NW9QAiWSOFUTyMWX9EkBscChT0kHTUAYlcZQTVsbNHRRC65FGfW9/exec" style="width:100%; margin-bottom:15px; background:#222; color:#fff; border:1px solid #444; padding:8px;">
    
    <button id="finalStartBtn" style="width:100%; background:#ff6600; color:#000; font-weight:bold; padding:12px; border:none; cursor:pointer; text-transform:uppercase;">START MONITORING</button>
</div>

<div id="squad-list-container" style="margin-top:20px; background:#111; border:1px solid #333; padding:15px; display:none; border-radius:4px;">
    <h3 style="margin:0 0 15px 0; font-size:14px; border-bottom:1px solid #333; color:#00ffee; padding-bottom:5px;">📡 SQUAD STATUS (RAW)</h3>
    <table style="width:100%; border-collapse: collapse; text-align: left;">
        <tbody id="squad-table-body"></tbody>
    </table>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="monitor-canvas" style="display:none;"></canvas>

<script>
(function() {
    const tesseractScript = document.createElement('script');
    tesseractScript.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    document.head.appendChild(tesseractScript);

    let lastStatus = "ALIVE";
    let lastLoc = "SCANNING...";
    let ocrCounter = 0;
    let lastSyncTime = 0;

    function log(msg) {
        const d = document.getElementById('debug-log');
        if (d) { d.innerHTML += "<br>> " + msg; d.scrollTop = d.scrollHeight; }
    }

    tesseractScript.onload = () => { 
        log("OCR Engine Ready.");
        document.getElementById('finalStartBtn').addEventListener('click', init); 
    };

    function updateUI() {
        const name = document.getElementById('pName').value;
        const tbody = document.getElementById('squad-table-body');
        if (!name) return;

        let row = document.getElementById(`row-${name}`);
        if (!row) {
            row = document.createElement('tr');
            row.id = `row-${name}`;
            row.style.cssText = "color:#44ff44; border-bottom:1px solid #222;";
            tbody.prepend(row);
        }
        
        const syncPulse = (Date.now() - lastSyncTime < 2000) ? 'opacity:1;' : 'opacity:0.3;';
        
        row.innerHTML = `
            <td style="padding:10px;">
                <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#0f0; margin-right:8px; transition:0.3s; ${syncPulse}"></span>
                ${name} <span style="font-size:9px; color:#00ffee;">(YOU)</span>
            </td>
            <td style="padding:10px; color:#aaa; font-weight:normal;">${lastLoc}</td>
            <td style="padding:10px; font-weight:bold;">${lastStatus}</td>
        `;
    }

    async function scanScreen() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('monitor-canvas');
        const debugCanvas = document.getElementById('ocr-debug-view');
        if (!video || video.readyState !== 4) return;

        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        ocrCounter++;

        if (ocrCounter % 2 === 0) {
            // Resolution Independent Sweep
            const sweepW = Math.floor(canvas.width * 0.32); 
            const sweepH = 100;
            const startX = canvas.width - sweepW - 10;
            const startY = Math.floor(canvas.height * 0.18); 

            debugCanvas.width = sweepW;
            debugCanvas.height = sweepH;
            const dCtx = debugCanvas.getContext('2d');
            dCtx.drawImage(canvas, startX, startY, sweepW, sweepH, 0, 0, sweepW, sweepH);

            const thresh = document.getElementById('threshSlider').value;
            let imgData = dCtx.getImageData(0, 0, debugCanvas.width, debugCanvas.height);
            let data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                let v = ((data[i] + data[i+1] + data[i+2]) / 3) > thresh ? 0 : 255; 
                data[i] = data[i+1] = data[i+2] = v;
            }
            dCtx.putImageData(imgData, 0, 0);

            try {
                const { data: { text } } = await Tesseract.recognize(debugCanvas, 'eng');
                
                // Pure Regex Match - No external list filtering
                const match = text.match(/(?:location|loc)\s*[:;]\s*([^(\n\r]+)/i);
                
                if(match) {
                    lastLoc = match[1].trim().toUpperCase().replace(/[^A-Z0-9\s]/g, "");
                    log("RAW CAPTURE: " + lastLoc);
                } else {
                    // Keyword fallback to help "lock" the right line if 'location' word is missed
                    const lines = text.split('\n');
                    const found = lines.find(l => l.includes("RR") || l.includes("CLINIC") || l.includes("STATION") || l.includes("HALO"));
                    if (found) {
                        lastLoc = found.trim().toUpperCase().replace(/[^A-Z0-9\s]/g, "");
                    }
                }
            } catch(e) { log("OCR Error: " + e); }
        }

        updateUI();
        
        const gUrl = document.getElementById('gUrl').value;
        const pName = document.getElementById('pName').value;
        const gCode = document.getElementById('gCode').value.toUpperCase();
        if (gUrl && pName) {
            fetch(gUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ player_name: pName, status: lastStatus, group_code: gCode, location: lastLoc }) 
            }).then(() => { lastSyncTime = Date.now(); });
        }
    }

    async function init() {
        if(!document.getElementById('pName').value) return;
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            document.getElementById('squad-list-container').style.display = "block";
            updateUI();
            setInterval(scanScreen, 4000);
            document.getElementById('finalStartBtn').innerText = "RAW CAPTURE ACTIVE";
            document.getElementById('finalStartBtn').style.background = "#333";
            document.getElementById('finalStartBtn').disabled = true;
        } catch (err) { log("Error: " + err.message); }
    }
})();
</script>
</body>
</html>
