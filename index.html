<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Squad Monitor</title>
</head>
<body style="background:#050505; margin:20px; color:#fff; font-family:Consolas, monospace;">

<div id="debug-log" style="background:#000; color:#0f0; padding:10px; height:60px; overflow-y:scroll; font-size:11px; margin-bottom:10px; border:1px solid #333; border-radius:4px;">
    [SYSTEM READY] - Universal Resolution Sweep Active.
</div>

<div style="margin-bottom:10px; border:1px solid #444; background:#111; padding:10px; border-radius:4px;">
    <span style="color:#00ffee; font-size:10px;">DYNAMIC OCR SWEEP (TOP RIGHT)</span>
    <canvas id="ocr-debug-view" style="width:100%; height:80px; background:#000; border:1px solid #222; image-rendering: pixelated; margin-top:5px;"></canvas>
</div>

<div style="background:#1a1a1a; padding:15px; border:1px solid #333; border-radius:4px;">
    <input type="text" id="pName" placeholder="RSI Handle" style="width:100%; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; padding:8px;">
    <input type="text" id="gCode" placeholder="Group Code" style="width:100%; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; padding:8px;">
    <input type="text" id="gUrl" value="https://script.google.com/macros/s/AKfycbyqazOPGDBqahu8NW9QAiWSOFUTyMWX9EkBscChT0kHTUAYlcZQTVsbNHRRC65FGfW9/exec" style="width:100%; margin-bottom:15px; background:#222; color:#fff; border:1px solid #444; padding:8px;">
    <button id="finalStartBtn" style="width:100%; background:#ff6600; color:#000; font-weight:bold; padding:12px; border:none; cursor:pointer;">START MONITORING</button>
</div>

<div id="squad-list-container" style="margin-top:20px; display:none;">
    <table style="width:100%; border-collapse: collapse; text-align: left;">
        <tbody id="squad-table-body"></tbody>
    </table>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="monitor-canvas" style="display:none;"></canvas>

<script>
(function() {
    const tesseractScript = document.createElement('script');
    tesseractScript.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    document.head.appendChild(tesseractScript);

    let lastStatus = "ALIVE";
    let lastLoc = "SCANNING...";
    let ocrCounter = 0;

    function log(msg) {
        const d = document.getElementById('debug-log');
        if (d) { d.innerHTML += "<br>> " + msg; d.scrollTop = d.scrollHeight; }
    }

    tesseractScript.onload = () => { log("OCR Initialized."); document.getElementById('finalStartBtn').addEventListener('click', init); };

    function updateUI() {
        const name = document.getElementById('pName').value;
        const tbody = document.getElementById('squad-table-body');
        if (!name) return;
        let row = document.getElementById(`row-${name}`);
        if (!row) {
            row = document.createElement('tr'); row.id = `row-${name}`;
            row.style.cssText = "color:#44ff44; border-bottom:1px solid #222;";
            tbody.prepend(row);
        }
        row.innerHTML = `<td style="padding:10px;">${name} (YOU)</td><td style="padding:10px; color:#aaa;">${lastLoc}</td><td style="padding:10px; font-weight:bold;">${lastStatus}</td>`;
    }

    async function scanScreen() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('monitor-canvas');
        const debugCanvas = document.getElementById('ocr-debug-view');
        if (!video || video.readyState !== 4) return;

        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        ocrCounter++;

        if (ocrCounter % 2 === 0) {
            // --- RESOLUTION INDEPENDENT SWEEP ---
            // Captures 30% of width and 25% of height from the top right
            const sweepW = Math.floor(canvas.width * 0.30);
            const sweepH = Math.floor(canvas.height * 0.25);
            const sweepX = canvas.width - sweepW - 10;
            const sweepY = Math.floor(canvas.height * 0.12); // Starts higher to catch early lines

            debugCanvas.width = sweepW; debugCanvas.height = sweepH;
            const dCtx = debugCanvas.getContext('2d');
            dCtx.drawImage(canvas, sweepX, sweepY, sweepW, sweepH, 0, 0, sweepW, sweepH);

            // Binarization for OCR clarity
            let imgData = dCtx.getImageData(0, 0, debugCanvas.width, debugCanvas.height);
            let data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                let v = ((data[i] + data[i+1] + data[i+2]) / 3) > 170 ? 0 : 255; 
                data[i] = data[i+1] = data[i+2] = v;
            }
            dCtx.putImageData(imgData, 0, 0);

            try {
                const { data: { text } } = await Tesseract.recognize(debugCanvas, 'eng');
                // Pattern matches the location line regardless of what text is above/below it
                const match = text.match(/(?:location|loc)\s*[:;]\s*([^(\n\r]+)/i);
                if(match) {
                    lastLoc = match[1].trim().toUpperCase().replace(/[^A-Z0-9\s]/g, "");
                    log("LOCKED: " + lastLoc);
                } else {
                    // Failover sweep for specific POI keywords
                    const lines = text.split('\n');
                    const fallback = lines.find(l => l.includes("RR") || l.includes("CLINIC") || l.includes("STATION"));
                    if (fallback) lastLoc = fallback.trim().toUpperCase();
                }
            } catch(e) {}
        }

        updateUI();
        const gUrl = document.getElementById('gUrl').value;
        const pName = document.getElementById('pName').value;
        if (gUrl && pName) {
            fetch(gUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ player_name: pName, status: lastStatus, group_code: document.getElementById('gCode').value, location: lastLoc }) });
        }
    }

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            document.getElementById('squad-list-container').style.display = "block";
            updateUI();
            setInterval(scanScreen, 4000);
            document.getElementById('finalStartBtn').disabled = true;
            document.getElementById('finalStartBtn').innerText = "SWEEPING ACTIVE";
        } catch (err) { log("Error: " + err.message); }
    }
})();
</script>
</body>
</html>
